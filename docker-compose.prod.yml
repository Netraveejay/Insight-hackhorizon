# Production — single container (API + UI + SQLite + persisted data)
# Usage: cp .env.example .env && docker compose -f docker-compose.prod.yml up -d --build

services:
  insight:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/insight.db
      REPORTS_DIR: /app/data/reports
      RULES_PATH: /app/rules/rules.v1.yaml
    volumes:
      - insight-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Optional PostgreSQL — uncomment and set DATABASE_URL in .env
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: insight
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insight}
  #     POSTGRES_DB: insight
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U insight"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

volumes:
  insight-data:
