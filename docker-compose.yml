services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: insight
      POSTGRES_PASSWORD: insight
      POSTGRES_DB: insight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insight"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://insight:insight@db:5432/insight
      RULES_PATH: /app/rules/rules.v1.yaml
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app/backend
      - ./rules:/app/rules
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
